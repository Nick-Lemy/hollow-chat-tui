name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            archive: tar.gz
          - rid: linux-arm64
            archive: tar.gz
          - rid: linux-musl-x64
            archive: tar.gz
          - rid: win-x64
            archive: zip
          - rid: win-arm64
            archive: zip
          - rid: osx-x64
            archive: tar.gz
          - rid: osx-arm64
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish client (self-contained, single file)
        run: |
          dotnet publish client/client.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -p:AssemblyName=hollow-chat \
            -p:DebugType=none \
            -o "publish/${{ matrix.rid }}"

      - name: Package
        run: |
          cd "publish/${{ matrix.rid }}"
          rm -f *.pdb
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "../../hollow-chat-tui-${{ matrix.rid }}.zip" .
          else
            tar -czf "../../hollow-chat-tui-${{ matrix.rid }}.tar.gz" .
          fi

      - name: Upload to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hollow-chat-tui-${{ matrix.rid }}.*
          generate_release_notes: true
